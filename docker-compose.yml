services:
  fleetquiz:
    build: .
    image: fleetquiz:latest
    container_name: fleetquiz
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # SQLite DB. A named volume is fine for dev; bind-mount it to a backed-up
      # path on a host if you want the DB included in your backups.
      - fleetquiz-data:/data
    # Lets the container reach an AI endpoint running on the host (e.g. LM Studio
    # on localhost:1234). Harmless if you point AI_BASE_URL elsewhere.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # --- AI / question generation (OpenAI-compatible endpoint) ---
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:1234/v1}
      AI_MODEL: ${AI_MODEL:-local-model}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_TIMEOUT: ${AI_TIMEOUT:-180}
      # --- auth / admin ---
      QUIZ_SECRET_KEY: ${QUIZ_SECRET_KEY:-dev-insecure-change-me}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}

volumes:
  fleetquiz-data:
