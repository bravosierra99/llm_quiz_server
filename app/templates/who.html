{% extends "base.html" %}
{% block title %}Who's studying? · FleetQuiz{% endblock %}
{% block body %}
<h1>Who's studying?</h1>
<p class="muted">Pick your profile, or add a new one.</p>

<div class="profile-grid">
  {% for u in users %}
  <form method="post" action="/who/pick">
    <input type="hidden" name="user_id" value="{{ u.id }}">
    <button class="profile" type="submit">
      <span class="avatar">{{ u.name[0]|upper }}</span>
      <span>{{ u.name }}{% if u.is_admin %} ⭐{% endif %}</span>
    </button>
  </form>
  {% endfor %}
</div>

<div class="card">
  <h3>Add a person</h3>
  <form method="post" action="/who/new" class="stack">
    <label>Name <input name="name" required placeholder="e.g. Maya"></label>
    <label>Email <span class="muted">(optional — only for admins via SSO)</span>
      <input name="email" type="email" placeholder="optional"></label>
    <button type="submit" class="primary">Create profile</button>
  </form>
</div>
{% endblock %}
