<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FleetQuiz{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">🧠 FleetQuiz</a>
  <nav>
    <a href="/">Library</a>
    <a href="/quiz">Take a quiz</a>
    <a href="/history">History</a>
    {% if user and user.is_admin %}<a href="/analytics">Analytics</a>
    <a href="/review">Review</a>
    <a href="/import">Import</a>{% endif %}
  </nav>
  <div class="who">
    {% if user %}
      <span class="pill">{{ user.name }}{% if user.is_admin %} ⭐{% endif %}</span>
      <a href="/logout" class="muted">switch</a>
    {% else %}
      <a href="/who">Sign in</a>
    {% endif %}
  </div>
</header>
<main>
  {% block body %}{% endblock %}
</main>
<footer class="muted">FleetQuiz · family study · self-hosted</footer>
<script>
// Don't let a second action fire while one is still working: when any form inside
// an action row submits, disable every button in that row (the submit itself still
// goes through). Stops e.g. firing two tutor calls from the feedback screen.
document.addEventListener('submit', function (e) {
  var box = e.target.closest('.feedback-actions, .row-actions, .actions');
  if (box) box.querySelectorAll('button').forEach(function (b) { b.disabled = true; });
}, true);
</script>
</body>
</html>
