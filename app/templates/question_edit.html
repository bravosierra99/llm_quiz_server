{% extends "base.html" %}
{% block title %}{{ 'Edit' if q else 'New' }} question · FleetQuiz{% endblock %}
{% block body %}
<h1>{{ 'Edit question' if q else 'New question' }}</h1>
<p class="muted">Chapter: {{ chapter.name }}</p>

<form method="post"
      action="{{ ('/questions/' ~ q.id) if q else ('/nodes/' ~ chapter.id ~ '/questions') }}"
      class="stack card" id="qform">
  <label>Type
    <select name="type" id="qtype" onchange="syncType()">
      {% for t in ['mcq','truefalse','short'] %}
      <option value="{{ t }}" {{ 'selected' if q and q.type == t else '' }}>{{ t }}</option>
      {% endfor %}
    </select>
  </label>

  <label>Question
    <textarea name="prompt" rows="2" required>{{ q.prompt if q else '' }}</textarea>
  </label>

  <label id="choices-field">Choices <span class="muted">(one per line — MCQ only)</span>
    <textarea name="choices" rows="4" placeholder="One choice per line">{{ q.choices|join('\n') if q else '' }}</textarea>
  </label>

  <label>Correct answer
    <span class="muted">(MCQ: must match a choice exactly · True/False: True or False)</span>
    <input name="answer" value="{{ q.answer if q else '' }}" required>
  </label>

  <label>Explanation <span class="muted">(optional)</span>
    <textarea name="explanation" rows="2">{{ q.explanation if q else '' }}</textarea>
  </label>

  <label>Source <span class="muted">(optional — where this question comes from)</span>
    <select name="source_id">
      <option value="">— none —</option>
      {% for s in sources %}
      <option value="{{ s.id }}" {{ 'selected' if q and q.source_id == s.id else '' }}>{{ s.title }}</option>
      {% endfor %}
    </select>
  </label>

  <div class="actions">
    <button type="submit" class="primary">{{ 'Save changes' if q else 'Add question' }}</button>
    <a class="btn" href="/nodes/{{ chapter.id }}">Cancel</a>
  </div>
</form>

<script>
function syncType() {
  const t = document.getElementById('qtype').value;
  document.getElementById('choices-field').style.display = (t === 'mcq') ? '' : 'none';
}
syncType();
</script>
{% endblock %}
